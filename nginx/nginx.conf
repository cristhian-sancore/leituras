server {
    listen 80;
    server_name _;

    # ============================================
    # SECURITY HEADERS — Pentest hardening
    # ============================================
    # Impede clickjacking (embed em iframe)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Impede sniffing de content-type
    add_header X-Content-Type-Options "nosniff" always;
    # XSS Protection legacy browsers
    add_header X-XSS-Protection "1; mode=block" always;
    # Nao vazar Referer para dominios externos
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Limitar permissoes de recursos do browser
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;
    # Esconder versao do servidor
    server_tokens off;

    # Frontend - arquivos estaticos
    root /usr/share/nginx/html;
    index index.html;

    # Bloquear acesso a arquivos sensiveis
    location ~ /\.(env|git|htaccess|htpasswd|DS_Store) {
        deny all;
        return 404;
    }

    # Cache para fontes e imagens (raramente mudam)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # JS e CSS: sem cache (garante que o browser sempre pega a versão nova após deploy)
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # API - proxy para backend FastAPI
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload de arquivos ate 10MB
        client_max_body_size 10M;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check (sem log)
    location /health {
        proxy_pass http://backend:8000;
        access_log off;
    }

    # Uploads (logos, arquivos) - proxy para o backend
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # URLs limpas (sem .html) e SPA fallback
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
