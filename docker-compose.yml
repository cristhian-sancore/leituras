version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: saemi_db
    environment:
      POSTGRES_DB: saemi
      POSTGRES_USER: saemi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-saemi_secure_2026}
    volumes:
      - saemi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saemi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/cristhian-sancore/leituras/backend:latest
    container_name: saemi_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://saemi:${DB_PASSWORD:-saemi_secure_2026}@db:5432/saemi
      JWT_SECRET: ${JWT_SECRET:-saemi-jwt-secret-key-prod-2026-xk9m2}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - saemi_uploads_data:/app/uploads
    restart: unless-stopped

  nginx:
    image: ghcr.io/cristhian-sancore/leituras/nginx:latest
    container_name: saemi_proxy
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  saemi_postgres_data:
  saemi_uploads_data:
