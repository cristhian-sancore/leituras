<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAEMI - Impressão LIS</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body{background:#0f172a;color:#e2e8f0;font-family:'Inter',sans-serif}
.print-layout{display:grid;grid-template-columns:420px 1fr;gap:24px;padding:24px;min-height:100vh}
.panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px}
.panel-title{font-weight:700;font-size:1rem;margin-bottom:16px;color:#38bdf8}
.ig{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.ig label{font-size:0.75rem;color:#64748b}
.ig input,.ig select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#e2e8f0;padding:8px 12px;border-radius:8px;font-size:0.85rem}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:0.85rem;transition:.15s}
.btn-print{background:#38bdf8;color:#0a0f1e;width:100%}
.btn-print:hover{background:#0ea5e9}
.btn-test{background:rgba(56,189,248,0.15);color:#38bdf8;border:1px solid rgba(56,189,248,0.3);width:100%;margin-top:8px}
.btn-back{background:transparent;color:#64748b;border:1px solid rgba(255,255,255,0.1);margin-bottom:16px}
.status-ok{color:#34d399;font-size:0.8rem}
.status-err{color:#f87171;font-size:0.8rem}
.status-loading{color:#fbbf24;font-size:0.8rem}

/* ── PREVIEW 80mm ── */
.receipt-wrap{display:flex;justify-content:center;padding:12px 0}
.receipt{
  background:white;color:#111;
  width:302px; /* 80mm @ 96dpi */
  padding:12px;font-family:'Courier New',monospace;
  font-size:11px;line-height:1.4;
  border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,0.5)
}
.rec-center{text-align:center}
.rec-title{font-size:13px;font-weight:900;text-align:center;margin:4px 0}
.rec-sep{border:none;border-top:1px dashed #333;margin:6px 0}
.rec-row{display:flex;justify-content:space-between;margin:2px 0}
.rec-row.bold{font-weight:900;font-size:12px}
.rec-row.total{font-weight:900;font-size:14px;margin-top:4px}
.rec-bar{text-align:center;margin:8px 0;letter-spacing:2px;font-size:20px;font-family:monospace}
.printer-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.printer-item{padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:0.8rem;display:flex;justify-content:space-between}
.printer-item:hover,.printer-item.selected{border-color:#38bdf8;background:rgba(56,189,248,0.08)}
.printer-item .pname{font-weight:600;color:#e2e8f0}
.printer-item .puid{color:#64748b;font-size:0.72rem}
.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;border:1px solid rgba(255,255,255,0.1);padding:12px 20px;border-radius:10px;font-size:0.85rem;display:none;z-index:999}
.toast.show{display:block}.toast.err{color:#f87171;border-color:#f87171}
.toast.ok{color:#34d399;border-color:#34d399}
</style>
</head>
<body>

<div class="print-layout">

  <!-- PAINEL ESQUERDO: config -->
  <div>
    <button class="btn btn-back" onclick="history.back()">← Voltar</button>

    <!-- Impressora -->
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">🖨️ Impressora Zebra (Bluetooth)</div>
      <div id="printer-status" class="status-err">Desconectado</div>
      <button class="btn btn-test" id="btn-conectar" onclick="conectarBluetooth()">🔗 Conectar Bluetooth</button>
      <button class="btn btn-test" onclick="imprimirTeste()" style="margin-top:4px">📄 Imprimir Teste</button>
    </div>

    <!-- Ações -->
    <div class="panel">
      <div class="panel-title">🖨️ Imprimir Conta</div>
      <div id="client-info" style="font-size:0.85rem;color:#94a3b8;margin-bottom:16px">
        Nenhum cliente selecionado.
      </div>
      <button class="btn btn-print" id="btn-imprimir" onclick="imprimirConta()" disabled>
        🖨️ Imprimir Agora
      </button>
      <div style="margin-top:12px;font-size:0.75rem;color:#475569">
        ⚠️ É necessário ligar o Bluetooth e o GPS do aparelho. O navegador irá pedir permissão para parear.
      </div>
    </div>
  </div>

  <!-- PAINEL DIREITO: preview -->
  <div class="panel">
    <div class="panel-title">👁️ Preview da Impressão (80mm)</div>
    <div class="receipt-wrap">
      <div class="receipt" id="receipt-preview">
        <!-- preenchido por JS -->
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/zebra-print.js"></script>
<script>
let selectedPrinter = null;
let dadosImpressao = null;

// ── Lê dados da URL (passados pelo app.js) ──
function lerParams() {
  const p = new URLSearchParams(location.search);
  return {
    empresa_nome: p.get('empresa') || 'SAEMI',
    empresa_cnpj: p.get('cnpj') || '',
    mes_ref: p.get('mes') || '',
    data_leitura: p.get('data') || new Date().toLocaleDateString('pt-BR'),
    vencimento: p.get('venc') || '',
    matricula: p.get('mat') || '',
    nome: p.get('nome') || '',
    endereco: p.get('end') || '',
    bairro: p.get('bairro') || '',
    rota: p.get('rota') || '',
    setor: p.get('setor') || '',
    leit_anterior: p.get('ant') || '0',
    leit_atual: p.get('atu') || '0',
    consumo: p.get('cons') || '0',
    ocorrencia: p.get('ocorr') || '',
    valor_agua: parseFloat(p.get('agua') || '0'),
    valor_esgoto: parseFloat(p.get('esgoto') || '0'),
    valor_lixo: parseFloat(p.get('lixo') || '0'),
    valor_total: parseFloat(p.get('total') || '0'),
    categoria: p.get('cat') || '',
    leiturista: p.get('leit') || '',
    tem_notificacao: p.get('tem_notif') === 'true',
    mensagem_notificacao: p.get('msg_notif') || ''
  };
}

function fmtR(v) {
  return 'R$ ' + parseFloat(v||0).toFixed(2).replace('.',',');
}

function renderPreview(d) {
  // Preencher info cliente no painel esquerdo
  document.getElementById('client-info').innerHTML =
    `<strong>${d.nome}</strong><br>Mat. ${d.matricula} | Consumo: ${d.consumo} m³ | <strong>${fmtR(d.valor_total)}</strong>`;

  const el = document.getElementById('receipt-preview');
  el.innerHTML = '';
  el.style.position = 'relative';
  el.style.height = '1200px'; // Tamanho estimado, pode estourar o limite visual

  // Obter CPCL gerado com os dados reais
  if (typeof ZebraPrint === 'undefined' || !ZebraPrint.gerarCPCL) return;
  
  function drawCpcl(cpclText, offsetY) {
      if(!cpclText) return offsetY;
      const lines = cpclText.split(/\r?\n/);
      const SCALE_X = 3.5;
      const SCALE_Y = 3.5;
      let maxY = 0;

      lines.forEach(line => {
        line = line.trim();
        if (!line) return;

        if (line.startsWith('T ')) {
          const parts = line.split(' ');
          if (parts.length < 6) return;
          const font = parts[1];
          const x = parseFloat(parts[3]) * SCALE_X;
          const y = parseFloat(parts[4]) * SCALE_Y + offsetY;
          if (y > maxY) maxY = y;
          const text = parts.slice(5).join(' ');
          
          const div = document.createElement('div');
          div.textContent = text;
          div.style.position = 'absolute';
          div.style.left = x + 'px';
          div.style.top = y + 'px';
          div.style.fontFamily = 'monospace';
          div.style.fontSize = font === '7' ? '14px' : '11px';
          div.style.fontWeight = font === '7' ? 'bold' : 'normal';
          div.style.whiteSpace = 'nowrap';
          el.appendChild(div);
        } 
        else if (line.startsWith('LINE ')) {
          const parts = line.split(' ');
          if (parts.length < 5) return;
          const x0 = parseFloat(parts[1]) * SCALE_X;
          const y0 = parseFloat(parts[2]) * SCALE_Y + offsetY;
          const x1 = parseFloat(parts[3]) * SCALE_X;
          const y1 = parseFloat(parts[4]) * SCALE_Y + offsetY;
          if (y1 > maxY) maxY = y1;
          
          const div = document.createElement('div');
          div.style.position = 'absolute';
          div.style.left = Math.min(x0, x1) + 'px';
          div.style.top = Math.min(y0, y1) + 'px';
          div.style.width = Math.max(Math.abs(x1 - x0), 1) + 'px';
          div.style.height = Math.max(Math.abs(y1 - y0), 1) + 'px';
          div.style.backgroundColor = '#333';
          el.appendChild(div);
        }
        else if (line.startsWith('B ')) {
          const parts = line.split(' ');
          if (parts.length > 7) {
            const x = parseFloat(parts[5]) * SCALE_X;
            const y = parseFloat(parts[6]) * SCALE_Y + offsetY;
            if (y > maxY) maxY = y;
            const div = document.createElement('div');
            div.textContent = '||||||||||||||| [CÓDIGO DE BARRAS]';
            div.style.position = 'absolute';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.fontFamily = 'monospace';
            div.style.fontSize = '12px';
            div.style.letterSpacing = '1px';
            el.appendChild(div);
          }
        }
      });
      return maxY;
  }

  const cpcl = ZebraPrint.gerarCPCL(d);
  let lastY = drawCpcl(cpcl, 0);
  
  if (d.tem_notificacao && ZebraPrint.gerarCPCLNotificacao) {
      const notifCpcl = ZebraPrint.gerarCPCLNotificacao(d);
      if (notifCpcl) {
          // Linha divisória
          const div = document.createElement('div');
          div.style.position = 'absolute';
          div.style.top = (lastY + 30) + 'px';
          div.style.left = '10px';
          div.style.width = '280px';
          div.style.borderTop = '2px dashed #999';
          el.appendChild(div);
          
          drawCpcl(notifCpcl, lastY + 50);
      }
  }
}

// ── Bluetooth ──
async function conectarBluetooth() {
  const statusEl = document.getElementById('printer-status');
  statusEl.className = 'status-loading';
  statusEl.textContent = 'Conectando...';
  try {
    await ZebraPrint.connect();
    statusEl.className = 'status-ok';
    statusEl.textContent = '✅ Conectado à Impressora';
    document.getElementById('btn-imprimir').disabled = false;
  } catch (e) {
    statusEl.className = 'status-err';
    statusEl.textContent = '❌ ' + e.message;
  }
}

// ── Imprimir conta ──
async function imprimirConta() {
  if (!ZebraPrint.isConnected()) { toast('Conecte a impressora primeiro', true); return; }
  if (!dadosImpressao) { toast('Nenhum dado de impressão', true); return; }
  const btn = document.getElementById('btn-imprimir');
  btn.textContent = '⏳ Enviando...';
  btn.disabled = true;
  try {
    await ZebraPrint.imprimirConta(dadosImpressao);
    toast('✅ Conta impressa!');
  } catch (e) {
    toast('❌ ' + e.message, true);
  } finally {
    btn.textContent = '🖨️ Imprimir Agora';
    btn.disabled = false;
  }
}

// ── Imprimir teste ──
async function imprimirTeste() {
  if (!ZebraPrint.isConnected()) { toast('Conecte a impressora primeiro', true); return; }
  const cpcl = `! 0 200 200 400 1\r\nIN-MILLIMETERS\r\nT 7 0 10 10 SAEMI - TESTE OK!\r\nT 5 0 10 30 ${new Date().toLocaleString('pt-BR')}\r\nFORM\r\nPRINT\r\n`;
  try {
    await ZebraPrint.sendData(cpcl);
    toast('✅ Teste enviado!');
  } catch (e) {
    toast('❌ ' + e.message, true);
  }
}

function toast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (err ? 'err' : 'ok');
  setTimeout(() => t.className = 'toast', 3000);
}

// ── INIT ──
dadosImpressao = lerParams();

// Inicia buscando layout. Quando terminar, renderiza
ZebraPrint.fetchLayout().then(() => {
  renderPreview(dadosImpressao);
});
</script>
</body>
</html>
