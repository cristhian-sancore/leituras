<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SAEMI SaaS - Cadastre sua empresa de saneamento.">
    <title>SAEMI - Cadastro</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card" style="max-width: 500px;">
            <div class="auth-logo">
                <h1>💧 SAEMI</h1>
                <p>Cadastre sua empresa</p>
            </div>

            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="reg-empresa">Nome da Empresa *</label>
                    <input type="text" id="reg-empresa" placeholder="SAAE de Cidade X" required minlength="2">
                </div>
                <div class="input-group">
                    <label for="reg-cnpj">CNPJ (opcional)</label>
                    <input type="text" id="reg-cnpj" placeholder="00.000.000/0001-00">
                </div>

                <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
                <p style="font-size: 0.8rem; color: var(--text-light); margin-bottom: 16px; font-weight: 600;">ADMINISTRADOR DA CONTA</p>

                <div class="input-group">
                    <label for="reg-nome">Seu Nome *</label>
                    <input type="text" id="reg-nome" placeholder="João Silva" required minlength="2">
                </div>
                <div class="input-group">
                    <label for="reg-email">Email *</label>
                    <input type="email" id="reg-email" placeholder="admin@empresa.com" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="input-group">
                        <label for="reg-senha">Senha *</label>
                        <input type="password" id="reg-senha" placeholder="••••••" required minlength="6">
                    </div>
                    <div class="input-group">
                        <label for="reg-senha-conf">Confirmar *</label>
                        <input type="password" id="reg-senha-conf" placeholder="••••••" required minlength="6">
                    </div>
                </div>

                <div id="register-error" class="hidden" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 16px; padding: 10px; background: #fef2f2; border-radius: var(--radius-sm);"></div>

                <button type="submit" id="register-btn" class="btn btn-accent btn-lg" style="width: 100%; justify-content: center;">
                    Cadastrar Empresa
                </button>
            </form>

            <div class="auth-footer">
                Já tem conta? <a href="/">Fazer login</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
