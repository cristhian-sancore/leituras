<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SAEMI SaaS - Sistema de Leitura de Água como Serviço. Gerencie leituras de hidrômetros, tarifas e faturamento.">
    <title>SAEMI - Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>💧 SAEMI</h1>
                <p>Sistema de Leitura de Água</p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" placeholder="••••••" required minlength="6">
                </div>

                <div id="login-error" class="hidden" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 16px; padding: 10px; background: #fef2f2; border-radius: var(--radius-sm);"></div>

                <button type="submit" id="login-btn" class="btn btn-primary btn-lg" style="width: 100%; justify-content: center;">
                    Entrar
                </button>
            </form>

            <div class="auth-footer">
                Ainda não tem conta? <a href="/register.html">Cadastre sua empresa</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Se já logado, redirecionar
        if (api.isLoggedIn()) {
            window.location.href = '/app.html';
        }
    </script>
</body>
</html>
